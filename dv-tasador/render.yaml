# Render Blueprint — backend del Tasador DV
# En Render: New -> Blueprint -> elegí este repo. rootDir resuelve el error de ASGI ("Could not import module app").
services:
  - type: web
    name: dv-tasador-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ACTOR_ZONAPROP
        sync: false
      - key: ACTOR_MERCADOLIBRE
        sync: false
