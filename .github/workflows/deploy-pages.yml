name: Deploy frontend to GitHub Pages

# Publica frontend/ en GitHub Pages en cada push a main que toque el frontend.
# En el repo: Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
